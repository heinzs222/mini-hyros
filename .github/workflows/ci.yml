name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    name: Python tests (attributionops + backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          set -o pipefail
          python -m pytest \
            --cov=attributionops --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=${{ env.COV_MIN }} 2>&1 | tee pytest-output.txt
        env:
          COV_MIN: "85"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml

      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-log
          path: pytest-output.txt
          if-no-files-found: ignore

  frontend-tests:
    name: Dashboard tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run production build and Vitest
        run: |
          set -o pipefail
          npm run test 2>&1 | tee frontend-output.txt

      - name: Upload frontend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-log
          path: dashboard/frontend-output.txt
          if-no-files-found: ignore

      - name: Upload dashboard build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build-log
          path: dashboard/build-output.txt
          if-no-files-found: ignore
