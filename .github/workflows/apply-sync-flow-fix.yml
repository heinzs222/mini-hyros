name: Apply sync flow fix

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply targeted changes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected block not found in {path}")
              p.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace(
              "dashboard/src/app/page.tsx",
              'import { fetchReport, createWebSocket, fetchAuthMe, logout as logoutApi, syncSpend, syncAdNames, syncStripe, syncGhl, type ManagedWebSocket } from "@/lib/api";',
              'import { fetchReport, createWebSocket, fetchAuthMe, logout as logoutApi, syncSpend, syncStripe, syncGhl, type ManagedWebSocket } from "@/lib/api";',
          )

          replace(
              "dashboard/src/app/page.tsx",
              '''      ? toastRef.current.loading("Syncing all platforms…", { description: "Pulling ad spend, ad names and Stripe orders." })
      : 0;

    try {
      const [spendResult, namesResult, stripeResult, ghlResult] = await Promise.allSettled([
        withSyncDeadline("Spend sync", 60_000, (signal) => syncSpend({ platform: "all", start_date: syncStart, end_date: syncEnd }, signal)),
        withSyncDeadline("Ad name sync", 90_000, (signal) => syncAdNames("all", signal)),
        withSyncDeadline("Stripe sync", 180_000, (signal) => syncStripe({ start_date: syncStart, end_date: syncEnd }, signal)),
        withSyncDeadline("Lead sync", 90_000, (signal) => syncGhl({ start_date: syncStart, end_date: syncEnd }, signal)),
      ]);''',
              '''      ? toastRef.current.loading("Syncing report data…", { description: "Pulling ad spend, Stripe orders and GHL contact attribution." })
      : 0;

    try {
      const [spendResult, stripeResult, ghlResult] = await Promise.allSettled([
        withSyncDeadline("Spend sync", 120_000, (signal) => syncSpend({ platform: "all", start_date: syncStart, end_date: syncEnd }, signal)),
        withSyncDeadline("Stripe sync", 180_000, (signal) => syncStripe({ start_date: syncStart, end_date: syncEnd }, signal)),
        withSyncDeadline("GHL contact sync", 120_000, (signal) => syncGhl({
          start_date: syncStart,
          end_date: syncEnd,
          include_forms: false,
          include_opportunities: false,
        }, signal)),
      ]);''',
          )

          replace(
              "dashboard/src/app/page.tsx",
              '''      addSyncErrors("Spend", spendResult);
      addSyncErrors("Names", namesResult);
      addSyncErrors("Stripe", stripeResult);
      addSyncErrors("Leads", ghlResult);''',
              '''      addSyncErrors("Spend", spendResult);
      addSyncErrors("Stripe", stripeResult);
      addSyncErrors("GHL contacts", ghlResult);''',
          )

          replace(
              "dashboard/src/app/page.tsx",
              'description: "Ad spend, ad names and Stripe orders are up to date.",',
              'description: "Ad spend, Stripe orders and GHL contact attribution are up to date.",',
          )

          replace(
              "dashboard/src/app/page.tsx",
              '''  const handleManualSync = useCallback(async () => {
    const syncPromise = syncSpendData({ start_date: windowStart, end_date: windowEnd }, { notify: true });
    await loadReport();
    await syncPromise;
    // Force-fresh after the sync wrote new data so the cache doesn't serve stale numbers.
    await loadReport({ fresh: true });
  }, [loadReport, syncSpendData, windowEnd, windowStart]);''',
              '''  const handleManualSync = useCallback(async () => {
    // Wait for imports before building the report. Running both at once starved
    // the single-worker backend and left the Sync toast spinning indefinitely.
    await syncSpendData({ start_date: windowStart, end_date: windowEnd }, { notify: true });
    // Force-fresh after the sync wrote new data so the cache doesn't serve stale numbers.
    await loadReport({ fresh: true });
  }, [loadReport, syncSpendData, windowEnd, windowStart]);''',
          )

          replace(
              "dashboard/src/lib/api.ts",
              '''export async function syncGhl(params: {
  start_date?: string;
  end_date?: string;
} = {}, signal?: AbortSignal) {
  const sp = new URLSearchParams();
  if (params.start_date) sp.set("start_date", params.start_date);
  if (params.end_date) sp.set("end_date", params.end_date);
  const url = `${API_BASE}/api/ghl/sync${sp.toString() ? `?${sp.toString()}` : ""}`;''',
              '''export async function syncGhl(params: {
  start_date?: string;
  end_date?: string;
  include_forms?: boolean;
  include_opportunities?: boolean;
} = {}, signal?: AbortSignal) {
  const sp = new URLSearchParams();
  if (params.start_date) sp.set("start_date", params.start_date);
  if (params.end_date) sp.set("end_date", params.end_date);
  if (params.include_forms !== undefined) sp.set("include_forms", String(params.include_forms));
  if (params.include_opportunities !== undefined) sp.set("include_opportunities", String(params.include_opportunities));
  const url = `${API_BASE}/api/ghl/sync${sp.toString() ? `?${sp.toString()}` : ""}`;''',
          )

          replace(
              "backend/api/ghl_sync.py",
              '''async def ghl_sync(
    start_date: str = Query(default=""),
    end_date: str = Query(default=""),
    limit: int = Query(default=500, ge=1, le=2000),
):''',
              '''async def ghl_sync(
    start_date: str = Query(default=""),
    end_date: str = Query(default=""),
    limit: int = Query(default=500, ge=1, le=2000),
    include_forms: bool = Query(default=True),
    include_opportunities: bool = Query(default=True),
):''',
          )

          replace(
              "backend/api/ghl_sync.py",
              '''            contacts_result, submissions_result, opportunities_result = await asyncio.gather(
                _fetch_contacts(
                    client, token, location_id, limit, start_date=start_date, end_date=end_date
                ),
                _fetch_form_submissions(
                    client, token, location_id, limit, start_date, end_date
                ),
                _fetch_opportunities(client, token, location_id, limit),
                return_exceptions=True,
            )''',
              '''            contacts_result, submissions_result, opportunities_result = await asyncio.gather(
                _fetch_contacts(
                    client, token, location_id, limit, start_date=start_date, end_date=end_date
                ),
                _fetch_form_submissions(
                    client, token, location_id, limit, start_date, end_date
                ) if include_forms else asyncio.sleep(0, result=[]),
                _fetch_opportunities(client, token, location_id, limit)
                if include_opportunities else asyncio.sleep(0, result=[]),
                return_exceptions=True,
            )''',
          )

          replace(
              "backend/api/ghl_sync.py",
              '''        "errors": errors,
    }''',
              '''        "include_forms": include_forms,
        "include_opportunities": include_opportunities,
        "errors": errors,
    }''',
          )

          replace(
              "dashboard/src/components/ReportsView.tsx",
              'Reporting gap — {pct}% of orders matched to a source.',
              'Source coverage — {pct}% of orders matched to a source.',
          )

          replace(
              "dashboard/src/components/ReportsView.tsx",
              '''                       attributed to any ad source. That usually means the tracking pixel didn’t
                       capture a click for those sales, or a platform’s spend/clicks haven’t synced
                       yet — press <span className="font-semibold">Sync</span>, and confirm the
                       tracking script is firing on both your funnel and checkout pages.''',
              '''                       attributed to any ad source within the selected lookback window. This can
                       include direct, organic, recurring, or genuinely untracked sales. Sync refreshes
                       source data, but it cannot manufacture a click that was never captured.''',
          )

          api_test = Path("dashboard/src/lib/__tests__/api.test.ts")
          text = api_test.read_text(encoding="utf-8")
          text = text.replace(
              '  fetchLtvBySource,\n} from "@/lib/api";',
              '  fetchLtvBySource,\n  syncGhl,\n} from "@/lib/api";',
              1,
          )
          marker = 'describe("fetchLtvBySource", () => {'
          test_block = '''describe("syncGhl", () => {
  it("can request a lightweight contacts-only sync", async () => {
    const fetchMock = vi.fn(async () => makeResponse({ synced: 1 }));
    vi.stubGlobal("fetch", fetchMock);

    await syncGhl({
      start_date: "2026-07-04",
      end_date: "2026-07-11",
      include_forms: false,
      include_opportunities: false,
    });

    const [url, init] = lastFetchCall();
    expect(url).toBe(
      `${API_BASE}/api/ghl/sync?start_date=2026-07-04&end_date=2026-07-11&include_forms=false&include_opportunities=false`,
    );
    expect(init.method).toBe("POST");
  });
});

'''
          if marker not in text:
              raise SystemExit("api test marker missing")
          api_test.write_text(text.replace(marker, test_block + marker, 1), encoding="utf-8")
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/apply-sync-flow-fix.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/src/app/page.tsx dashboard/src/lib/api.ts dashboard/src/lib/__tests__/api.test.ts dashboard/src/components/ReportsView.tsx backend/api/ghl_sync.py .github/workflows/apply-sync-flow-fix.yml
          git commit -m "Fix blocking report sync and clarify source coverage"
          git push origin HEAD:main
