name: Apply sync flow fix

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Patch source and tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if old not in text:
                  raise RuntimeError(f"Expected text not found in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1), encoding="utf-8")

          def sub_once(path: str, pattern: str, replacement: str) -> None:
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f"Expected one regex match in {path}, got {count}: {pattern}")
              p.write_text(updated, encoding="utf-8")

          page = "dashboard/src/app/page.tsx"
          replace_once(
              page,
              'import { fetchReport, createWebSocket, fetchAuthMe, logout as logoutApi, syncSpend, syncAdNames, syncStripe, syncGhl, type ManagedWebSocket } from "@/lib/api";',
              'import { fetchReport, createWebSocket, fetchAuthMe, logout as logoutApi, syncSpend, syncStripe, syncGhl, type ManagedWebSocket } from "@/lib/api";',
          )
          replace_once(
              page,
              'toastRef.current.loading("Syncing all platforms…", { description: "Pulling ad spend, ad names and Stripe orders." })',
              'toastRef.current.loading("Syncing report data…", { description: "Pulling ad spend, Stripe orders and GHL attribution." })',
          )
          sub_once(
              page,
              r'      const \[spendResult, namesResult, stripeResult, ghlResult\] = await Promise\.allSettled\(\[\n.*?\n      \]\);',
              '''      const [spendResult, stripeResult, ghlResult] = await Promise.allSettled([
        withSyncDeadline("Spend sync", 90_000, (signal) => syncSpend({ platform: "all", start_date: syncStart, end_date: syncEnd }, signal)),
        withSyncDeadline("Stripe sync", 180_000, (signal) => syncStripe({ start_date: syncStart, end_date: syncEnd }, signal)),
        withSyncDeadline("GHL attribution sync", 120_000, (signal) => syncGhl({
          start_date: syncStart,
          end_date: syncEnd,
          include_forms: false,
          include_opportunities: false,
        }, signal)),
      ]);''',
          )
          replace_once(page, '      addSyncErrors("Names", namesResult);\n', '')
          replace_once(page, '      addSyncErrors("Leads", ghlResult);', '      addSyncErrors("GHL attribution", ghlResult);')
          replace_once(
              page,
              'description: "Ad spend, ad names and Stripe orders are up to date.",',
              'description: "Ad spend, Stripe orders and GHL attribution are up to date.",',
          )
          sub_once(
              page,
              r'  const handleManualSync = useCallback\(async \(\) => \{\n.*?\n  \}, \[loadReport, syncSpendData, windowEnd, windowStart\]\);',
              '''  const handleManualSync = useCallback(async () => {
    await syncSpendData({ start_date: windowStart, end_date: windowEnd }, { notify: true });
    // One force-fresh report build after every sync operation has settled.
    await loadReport({ fresh: true });
  }, [loadReport, syncSpendData, windowEnd, windowStart]);''',
          )

          api = "dashboard/src/lib/api.ts"
          replace_once(
              api,
              '''export async function syncGhl(params: {
  start_date?: string;
  end_date?: string;
} = {}, signal?: AbortSignal) {
  const sp = new URLSearchParams();
  if (params.start_date) sp.set("start_date", params.start_date);
  if (params.end_date) sp.set("end_date", params.end_date);''',
              '''export async function syncGhl(params: {
  start_date?: string;
  end_date?: string;
  include_forms?: boolean;
  include_opportunities?: boolean;
} = {}, signal?: AbortSignal) {
  const sp = new URLSearchParams();
  if (params.start_date) sp.set("start_date", params.start_date);
  if (params.end_date) sp.set("end_date", params.end_date);
  if (typeof params.include_forms === "boolean") sp.set("include_forms", String(params.include_forms));
  if (typeof params.include_opportunities === "boolean") sp.set("include_opportunities", String(params.include_opportunities));''',
          )

          ghl = "backend/api/ghl_sync.py"
          replace_once(
              ghl,
              '''async def ghl_sync(
    start_date: str = Query(default=""),
    end_date: str = Query(default=""),
    limit: int = Query(default=500, ge=1, le=2000),
):''',
              '''async def ghl_sync(
    start_date: str = Query(default=""),
    end_date: str = Query(default=""),
    limit: int = Query(default=500, ge=1, le=2000),
    include_forms: bool = Query(default=True),
    include_opportunities: bool = Query(default=True),
):''',
          )
          sub_once(
              ghl,
              r'            contacts_result, submissions_result, opportunities_result = await asyncio\.gather\(\n.*?\n                return_exceptions=True,\n            \)',
              '''            async def _empty_result() -> list[dict]:
                return []

            contacts_result, submissions_result, opportunities_result = await asyncio.gather(
                _fetch_contacts(
                    client, token, location_id, limit, start_date=start_date, end_date=end_date
                ),
                _fetch_form_submissions(
                    client, token, location_id, limit, start_date, end_date
                ) if include_forms else _empty_result(),
                _fetch_opportunities(client, token, location_id, limit)
                if include_opportunities else _empty_result(),
                return_exceptions=True,
            )''',
          )
          replace_once(
              ghl,
              '        "end_date": end_date,\n        "errors": errors,',
              '        "end_date": end_date,\n        "include_forms": include_forms,\n        "include_opportunities": include_opportunities,\n        "errors": errors,',
          )

          reports = "dashboard/src/components/ReportsView.tsx"
          replace_once(
              reports,
              '                const unattrRev = Number(s.unattributed_revenue ?? 0);',
              '                const unattrRev = Number(s.unattributed_revenue ?? 0);\n                const campaignAttributed = Number(report?.table?.totals_row?.orders ?? 0);',
          )
          replace_once(
              reports,
              '''                      <span className="font-semibold">
                        Reporting gap — {pct}% of orders matched to a source.
                      </span>{" "}
                      {unattrOrders} of {total} order{total === 1 ? "" : "s"}
                      {unattrRev > 0 ? ` (${money(unattrRev)})` : ""} in this range aren’t
                      attributed to any ad source. That usually means the tracking pixel didn’t
                      capture a click for those sales, or a platform’s spend/clicks haven’t synced
                      yet — press <span className="font-semibold">Sync</span>, and confirm the
                      tracking script is firing on both your funnel and checkout pages.''',
              '''                      <span className="font-semibold">
                        Source coverage — {pct}% of orders matched to a source touchpoint.
                      </span>{" "}
                      {unattrOrders} of {total} order{total === 1 ? "" : "s"}
                      {unattrRev > 0 ? ` (${money(unattrRev)})` : ""} in this range have no
                      qualifying source touchpoint inside the attribution window. This is not
                      automatically a sync failure: direct, recurring, offline, and identity-unmatched
                      sales can remain unattributed.
                      {activeTab === "campaign" && Number.isFinite(campaignAttributed) && (
                        <>
                          {" "}Campaign coverage in this view: <span className="font-semibold">
                            {campaignAttributed.toLocaleString(undefined, { maximumFractionDigits: 2 })} of {total} orders
                          </span>. A source touchpoint can exist without a campaign ID.
                        </>
                      )}''',
          )

          Path("tests/api/test_ghl_sync_modes.py").write_text(
              '''"""Regression tests for lightweight GHL attribution sync mode."""

from __future__ import annotations

import respx
from httpx import Response

from attributionops.db import sql_rows
import api.ghl_sync as gs

GHL = "https://services.leadconnectorhq.com"


def test_sync_can_skip_forms_and_opportunities(client, api_db):
    gs.save_ghl_credentials(api_db, "pit-test", "loc_1")
    contacts_page = {
        "contacts": [
            {
                "id": "contact-1",
                "email": "lead@example.com",
                "dateAdded": "2026-07-05T12:00:00.000Z",
                "source": "facebook",
                "attributionSource": {
                    "utmSource": "facebook",
                    "utmMedium": "paid_social",
                    "utmFbclid": "fb-click-1",
                },
            }
        ],
        "meta": {},
    }

    with respx.mock(assert_all_mocked=True) as router:
        router.get(url__startswith=f"{GHL}/contacts/").mock(
            return_value=Response(200, json=contacts_page)
        )
        response = client.post(
            "/api/ghl/sync"
            "?start_date=2026-07-04&end_date=2026-07-11"
            "&include_forms=false&include_opportunities=false"
        )

    assert response.status_code == 200
    body = response.json()
    assert body["errors"] == []
    assert body["leads"] == 1
    assert body["optins"] == 0
    assert body["orders"] == 0
    assert body["open_opportunities"] == 0
    assert body["include_forms"] is False
    assert body["include_opportunities"] is False

    rows = sql_rows(api_db, "SELECT type, customer_key FROM conversions")
    assert len(rows) == 1
    assert rows[0]["type"] == "Lead"
''',
              encoding="utf-8",
          )

          Path("dashboard/src/lib/__tests__/ghl-sync-api.test.ts").write_text(
              '''import { afterEach, beforeEach, describe, expect, it, vi } from "vitest";
import { syncGhl } from "@/lib/api";

const API_BASE = process.env.NEXT_PUBLIC_API_URL || "http://localhost:8000";

function makeResponse(body: unknown) {
  return {
    ok: true,
    status: 200,
    json: async () => body,
  } as unknown as Response;
}

describe("syncGhl", () => {
  beforeEach(() => {
    window.localStorage.clear();
    vi.restoreAllMocks();
  });

  afterEach(() => {
    vi.unstubAllGlobals();
  });

  it("can request contact attribution without forms or opportunities", async () => {
    const fetchMock = vi.fn(async () => makeResponse({ synced: 1 }));
    vi.stubGlobal("fetch", fetchMock);

    await syncGhl({
      start_date: "2026-07-04",
      end_date: "2026-07-11",
      include_forms: false,
      include_opportunities: false,
    });

    const [url, init] = fetchMock.mock.calls[0] as unknown as [string, RequestInit];
    expect(url).toBe(
      `${API_BASE}/api/ghl/sync?start_date=2026-07-04&end_date=2026-07-11&include_forms=false&include_opportunities=false`,
    );
    expect(init.method).toBe("POST");
  });
});
''',
              encoding="utf-8",
          )
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests
        run: |
          python -m pytest \
            --cov=attributionops --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=85

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Run dashboard tests
        working-directory: dashboard
        run: npm test

      - name: Commit tested fix to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            dashboard/src/app/page.tsx \
            dashboard/src/lib/api.ts \
            backend/api/ghl_sync.py \
            dashboard/src/components/ReportsView.tsx \
            tests/api/test_ghl_sync_modes.py \
            dashboard/src/lib/__tests__/ghl-sync-api.test.ts
          git diff --cached --check
          git commit -m "Fix manual sync flow and clarify source coverage"
          git push origin HEAD:main
