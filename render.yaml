services:
  - type: web
    name: mini-hyros-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    repo: https://github.com/YOUR_USERNAME/hyros
    # NOTE: Render persistent disks require a PAID instance type. The `disk:`
    # block below is ignored while `plan: free` — upgrade `plan` to a paid tier
    # (e.g. `starter`) for the disk to be provisioned. Until then, data still
    # resets on redeploy/spin-down because there is no attached disk.
    plan: free
    # Persistent SQLite storage so data survives redeploys and spin-downs
    # (the DB path env var below points here).
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: ATTRIBUTIONOPS_DB_PATH
        value: /var/data/attributionops.sqlite
      - key: REPORT_TIMEZONE
        value: Etc/GMT+6
      - key: TRACKING_DOMAIN
        sync: false
      - key: SITE_TOKEN
        value: your-site-token
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: META_INCLUDE_CAMPAIGN_ADJUSTMENTS
        value: "false"
      - key: META_PIXEL_ID
        sync: false
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_INCLUDE_CAMPAIGN_ADJUSTMENTS
        value: "false"
      - key: TIKTOK_ACCESS_TOKEN
        sync: false
      - key: STRIPE_RECURRING_AMOUNT_KEYS
        value: "CAD:5000"
      - key: AUTH_ENABLED
        value: "false"
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_SECRET_KEY
        sync: false
      - key: AUTH_SESSION_TTL_HOURS
        value: "12"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
